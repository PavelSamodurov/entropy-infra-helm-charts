cluster:
  allowSchedulingOnControlPlanes: true
  apiServer:
    certSANs:
      - $PUBLIC_IP

machine:
  registries:
    mirrors:
      ghcr.io:
        endpoints:
          - https://ghcr.io
    config:
      ghcr.io:
        auth:
          username: $GITHUB_USERNAME
          password: $GITHUB_PAT
